name: Fetch NBA Offer

on:
  schedule:
    # 19:00 CET = 18:00 UTC (zimsko racunanje)
    # 19:00 CEST = 17:00 UTC (ljetno racunanje - mart-oktobar)
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razlog rucnog pokretanja'
        required: false
        default: 'Manuelno osvjezavanje ponude'

jobs:
  fetch-offer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run fetch_todays_games.py
        run: python fetch_todays_games.py

      - name: Commit and push offer file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/todays_offer.txt data/todays_games.json
          git diff --cached --quiet || git commit -m "auto: fetch NBA offer $(date '+%Y-%m-%d %H:%M CET')"
          git push
